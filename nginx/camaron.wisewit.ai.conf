# /etc/nginx/sites-available/camaron.wisewit.ai
# Camaron — drop-in vhost for existing VM Nginx
# Symlink: sudo ln -s /etc/nginx/sites-available/camaron.wisewit.ai /etc/nginx/sites-enabled/

# Rate limiting zones (add these only if not already in nginx.conf main block)
# If you already have limit_req_zone in your nginx.conf, skip or rename these.
limit_req_zone $binary_remote_addr zone=camaron_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=camaron_otp:10m rate=5r/m;

# HTTP → HTTPS redirect for this subdomain
server {
    listen 80;
    server_name camaron.wisewit.ai;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name camaron.wisewit.ai;

    # SSL — issued by certbot for camaron.wisewit.ai
    ssl_certificate     /etc/letsencrypt/live/camaron.wisewit.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camaron.wisewit.ai/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:CAMARON_SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header X-XSS-Protection       "1; mode=block"                 always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── API — proxy to Camaron backend on port 4100 ───────────────────────────
    location /api/ {
        limit_req zone=camaron_api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # OTP endpoint — tighter rate limit
    location /api/v1/auth/send-otp {
        limit_req zone=camaron_otp burst=3 nodelay;

        proxy_pass         http://127.0.0.1:4100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Frontend — proxy to Camaron React app on port 3100 ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache hashed static assets (JS/CSS bundles have content hash in filename)
        location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|ico|webp)$ {
            proxy_pass http://127.0.0.1:3100;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
