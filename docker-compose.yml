version: '3.9'

# Port assignments for Camaron (all other projects keep their existing ports)
#   Backend  → 127.0.0.1:4100  (container internal: 4000)
#   Frontend → 127.0.0.1:3100  (container internal: 80)
#   Postgres → 127.0.0.1:5532  (container internal: 5432)
#   Redis    → 127.0.0.1:6479  (container internal: 6379)
#
# The existing VM Nginx on port 80/443 proxies camaron.wisewit.ai
# to 127.0.0.1:4100 (API) and 127.0.0.1:3100 (frontend).
# No Nginx container is needed — no port 80/443 conflict.

services:
  postgres:
    image: postgres:16-alpine
    container_name: camaron_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-camaron}
      POSTGRES_USER: ${POSTGRES_USER:-camaron_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camaron_user} -d ${POSTGRES_DB:-camaron}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camaron_net

  redis:
    image: redis:7-alpine
    container_name: camaron_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6479:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camaron_net

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: camaron_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    ports:
      - "127.0.0.1:4100:4000"
    networks:
      - camaron_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://camaron.wisewit.ai/api/v1}
    container_name: camaron_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:80"
    networks:
      - camaron_net

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  camaron_net:
    driver: bridge
