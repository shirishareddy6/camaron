name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/camaron

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: camaron_test
          POSTGRES_USER: camaron
          POSTGRES_PASSWORD: testpass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: camaron_test
          POSTGRES_USER: camaron
          POSTGRES_PASSWORD: testpass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ''
          JWT_SECRET: test_jwt_secret_at_least_64_characters_long_for_testing_only
          JWT_REFRESH_SECRET: test_refresh_secret_at_least_64_characters_long_for_testing
        run: npm test --if-present

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.camaron.in/api/v1
        run: npm run build

  # ── Build & Push images ──────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./docker/backend.Dockerfile
          push:    true
          tags:    ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend image
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./docker/frontend.Dockerfile
          push:    true
          tags:    ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Oracle Cloud VM ────────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.ORACLE_SSH_KEY }}" > /tmp/oracle_key
          chmod 600 /tmp/oracle_key

      - name: Copy compose file to VM
        run: |
          scp -i /tmp/oracle_key \
              -o StrictHostKeyChecking=no \
              docker-compose.yml \
              ubuntu@${{ secrets.ORACLE_HOST }}:~/camaron/docker-compose.yml

      - name: Deploy on VM
        run: |
          ssh -i /tmp/oracle_key \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
            set -e
            cd ~/camaron

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull backend frontend

            # Restart with zero-downtime rolling update
            docker compose up -d --no-deps --remove-orphans backend frontend nginx

            # Run migrations
            docker compose exec -T backend node src/config/migrate.js

            # Health check
            sleep 10
            curl -sf http://localhost:4000/health || (echo "Health check failed" && exit 1)

            echo "Deployment complete ✓"
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/oracle_key
